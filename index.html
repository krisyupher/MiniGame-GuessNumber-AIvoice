<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Number Voice - Friendly Voice Guessing Game</title>
  <!-- Google Fonts: Outfit and Quicksand for a warm, friendly and modern look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome for gaming and control icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <!-- Navbar Header -->
    <header class="app-header">
      <div class="logo">
        <i class="fa-solid fa-face-smile logo-icon"></i>
        <h1>Guess the Number <span class="neon-text">Voice</span></h1>
      </div>
      
      <div class="header-actions">
        <button id="btn-reset" class="action-btn" title="Reset Game" aria-label="Reset Game">
          <i class="fa-solid fa-arrow-rotate-right"></i> Reset Game
        </button>
      </div>
    </header>

    <!-- Main Game Layout -->
    <main class="game-container">
      
      <!-- Left Side: Secret Card and Attempts Log -->
      <section class="game-board glass-panel">
        <div class="card-wrapper">
          <div id="secret-card" class="secret-card">
            <div class="card-face card-front">
              <span class="secret-question">?</span>
            </div>
            <div class="card-face card-back">
              <span id="secret-number-reveal">--</span>
            </div>
          </div>
        </div>

        <div class="game-instructions">
          <p>Find the secret number between <span class="highlight">1</span> and <span class="highlight">100</span>.</p>
        </div>

        <!-- Attempts Log -->
        <div class="history-section">
          <div class="section-title">
            <h3>Previous Guesses</h3>
            <span id="attempts-badge" class="badge">0 Attempts</span>
          </div>
          <div id="attempts-list" class="attempts-grid">
            <div class="no-attempts-placeholder">No guesses yet. Don't be shy!</div>
          </div>
        </div>
      </section>

      <!-- Right Side: Speech visualizer and Dialogue transcript -->
      <section class="chat-and-voice glass-panel">
        
        <!-- Live Chat Transcript -->
        <div class="chat-feed-container">
          <div class="section-title">
            <h3>Dialogue Feed</h3>
            <span class="live-indicator"><span class="dot"></span> Voice Companion</span>
          </div>
          <div id="chat-feed" class="chat-feed">
            <!-- Chat logs will be populated programmatically -->
          </div>
        </div>

        <!-- Voice Area -->
        <div class="voice-control-area">
          <div id="transcript-display" class="transcript-display">
            Click the microphone and say your guess!
          </div>

          <!-- Audio Wave Visualizer -->
          <div id="visualizer" class="wave-visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>

          <!-- Primary Control Button -->
          <div class="main-buttons">
            <button id="btn-mic" class="mic-btn" aria-label="Microphone input">
              <div class="pulse-ring"></div>
              <i class="fa-solid fa-microphone mic-icon"></i>
            </button>
          </div>

          <!-- Alternate Input Toggle -->
          <div class="manual-input-toggle">
            <button id="toggle-manual-input" class="link-btn">
              <i class="fa-solid fa-keyboard"></i> Can't use voice? Type your guess
            </button>
          </div>

          <!-- Manual Guess Input Box (Initially Hidden) -->
          <form id="manual-input-form" class="manual-input-form hidden">
            <input 
              type="number" 
              id="guess-input" 
              placeholder="Enter 1 - 100" 
              min="1" 
              max="100" 
              required
            >
            <button type="submit" class="submit-btn">Guess</button>
          </form>
        </div>

      </section>

    </main>
  </div>

  <!-- Entry Script -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
